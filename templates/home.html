<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#1e293b;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    padding:15px;
    text-align:center;
    background:#dcfce7;
    border-radius:10px;
    color:#166534;
    font-weight:bold;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>
    <div class="container">
    <h1>🔥 Forest Fire Prediction</h1>

    <form action="{{ url_for('predict_datapoint')}}" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Temperature</label>
                <input type="number" step="any" name="Temperature" required>
            </div>

            <div class="form-group">
                <label>RH</label>
                <input type="number" step="any" name="RH" required>
            </div>

            <div class="form-group">
                <label>Ws</label>
                <input type="number" step="any" name="Ws" required>
            </div>

            <div class="form-group">
                <label>Rain</label>
                <input type="number" step="any" name="Rain" required>
            </div>

            <div class="form-group">
                <label>FFMC</label>
                <input type="number" step="any" name="FFMC" required>
            </div>

            <div class="form-group">
                <label>DMC</label>
                <input type="number" step="any" name="DMC" required>
            </div>

            <div class="form-group">
                <label>ISI</label>
                <input type="number" step="any" name="ISI" required>
            </div>

            <div class="form-group">
                <label>Classes</label>
                <input type="number" step="any" name="Classes" required>
            </div>

            <div class="form-group">
                <label>Region</label>
                <input type="number" step="any" name="Region" required>
            </div>

        </div>

        <button type="submit">Predict</button>

    </form>

    {% if result %}
    <div class="result">
        Predicted Fire Weather Index: {{ result }}
    </div>
    {% endif %}
</div>
</body>
</html>
